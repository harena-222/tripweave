<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Make Your Trip</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body class="bg-gradient-to-br from-pink-100 to-indigo-100 min-h-screen flex items-center justify-center">
  <div class="container max-w-lg mx-auto p-8 bg-white shadow-xl rounded-2xl">
    <h1 class="text-3xl font-extrabold text-pink-500 mb-6 text-center">Make Your Trip</h1>

    <form id="tripForm" class="flex flex-col gap-4">
      <textarea id="userInput"
        class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-pink-400 focus:outline-none transition resize-none overflow-y-auto min-h-[48px] max-h-32"
        placeholder="How can I help you?" required></textarea>

      <button type="submit" id="sendBtn"
        class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
        Plan My Trip
      </button>
    </form>

    <p id="result" class="mt-6 text-gray-700 leading-relaxed"></p>
  </div>
  <script>
    // フォームの送信イベントを直接拾う（Enterキーとクリック両方に対応）
    document.getElementById('tripForm').onsubmit = async (event) => {
      event.preventDefault();

      const input = document.getElementById('userInput').value.trim();
      const resultElement = document.getElementById('result');

      if (!input) return;

      resultElement.innerHTML = `
        <div class="animate-pulse text-gray-500 italic">Designing your travel plan for ${input}...</div>
    `;

      try {
        const response = await fetch('http://localhost:3000/api/trip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ destination: input })
        });

        if (!response.ok) throw new Error(`Status: ${response.status}`);

        const resData = await response.json();
        // Pythonからの入れ子構造 (aiResult.data) を考慮して抽出
        const aiData = resData.details;
        const entities = aiData.extracted_entities;

        // ★ここで表示内容を構築
        resultElement.innerHTML = `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-pink-100 space-y-4">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">📍</span>
                    <h3 class="text-xl font-bold text-gray-800">Location: ${entities.destination || 'Not specified'}</h3>
                </div>

                <div class="border-t border-gray-100 pt-4">
                    <p class="text-sm font-semibold text-pink-500 uppercase tracking-wider mb-1">Plan Summary</p>
                    <p class="text-gray-700 leading-relaxed text-lg">
                        ${aiData.final_summary.replace('{destination}', entities.destination || 'your destination').replace('{date_reference}', entities.date_reference || 'soon')}
                    </p>
                </div>

                ${entities.interests.length > 0 ? `
                <div class="flex flex-wrap gap-2 pt-2">
                    ${entities.interests.map(interest => `<span class="bg-indigo-50 text-indigo-600 text-xs px-3 py-1 rounded-full">#${interest}</span>`).join('')}
                </div>
                ` : ''}
            </div>
        `;
      } catch (error) {
        console.error(error);
        resultElement.innerHTML = `<p class="text-red-500 font-bold">Failed to connect. Try again later.</p>`;
      }
    };
  </script>
</body>

</html>
