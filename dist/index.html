<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Make Your Trip</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body class="bg-gradient-to-br from-pink-100 to-indigo-100 min-h-screen flex items-center justify-center">
  <div class="container max-w-lg mx-auto p-8 bg-white shadow-xl rounded-2xl">
    <h1 class="text-3xl font-extrabold text-pink-500 mb-6 text-center">Make Your Trip</h1>

    <form id="tripForm" class="flex flex-col gap-4">
      <input type="text" id="userInput"
        class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-pink-400 focus:outline-none transition"
        placeholder="How can I help you?" required>

      <button type="submit" id="sendBtn"
        class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
        Plan My Trip
      </button>
    </form>

    <p id="result" class="mt-6 text-gray-700 leading-relaxed"></p>
  </div>
  <script>
    // フォームの送信イベントを直接拾う（Enterキーとクリック両方に対応）
    document.getElementById('tripForm').onsubmit = async (event) => {
      event.preventDefault(); // 画面リロードを防止

      const input = document.getElementById('userInput').value.trim();
      const resultElement = document.getElementById('result');

      if (!input) return;

      resultElement.innerHTML = `
            <div class="animate-pulse text-gray-500 italic">Designing your travel plan...</div>
        `;

      try {
        const response = await fetch('http://localhost:3000/api/trip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ destination: input })
        });

        if (!response.ok) throw new Error(`Status: ${response.status}`);

        const data = await response.json();
        const details = data.details.extracted_entities;

        resultElement.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-pink-100">
                    <h3 class="text-lg font-bold text-pink-500 mb-3">Plan Found!</h3>
                    <div class="space-y-2 text-sm text-gray-700">
                        <p><span class="font-bold">Intent:</span> ${data.message}</p>
                        <p><span class="font-bold">Destination:</span> ${details.destination || 'N/A'}</p>
                        <p><span class="font-bold">Interests:</span> ${details.interests.join(', ') || 'N/A'}</p>
                    </div>
                </div>
            `;
      } catch (error) {
        resultElement.innerHTML = `<p class="text-red-500 font-bold">Failed to connect. Try again later.</p>`;
      }
    };
  </script>
</body>

</html>
