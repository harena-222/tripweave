<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Make Your Trip</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body class="bg-gradient-to-br from-pink-100 to-indigo-100 min-h-screen flex items-center justify-center">
  <div class="container max-w-lg mx-auto p-8 bg-white shadow-xl rounded-2xl">
    <h1 class="text-3xl font-extrabold text-pink-500 mb-6 text-center">Make Your Trip</h1>

    <form id="tripForm" class="flex flex-col gap-4">
      <input type="text" id="userInput"
        class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-pink-400 focus:outline-none transition"
        placeholder="How can I help you?" required>

      <button type="submit" id="sendBtn"
        class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
        Plan My Trip
      </button>
    </form>

    <p id="result" class="mt-6 text-gray-700 leading-relaxed"></p>
  </div>
  <script>
    document.getElementById('sendBtn').onclick = async () => {
      const inputElement = document.getElementById('userInput');
      const input = inputElement.value.trim();
      const resultElement = document.getElementById('result');

      // 1. Check if input is empty
      if (!input) {
        resultElement.innerHTML = "<em>What is your destination?</em>";
        return;
      }
      // 1. Show loading state
      resultElement.innerHTML = "<em>Designing your travel plan... Please wait a moment.</em>";

      try {
        const response = await fetch('http://localhost:3000/api/trip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ destination: input })
        });

        if (!response.ok) {
          throw new Error(`server response error: ${response.status}`);
        }

        const data = await response.json();
        const details = data.details.extracted_entities;

        // 2. Show success result
        resultElement.innerHTML = `
            <strong>Intent:</strong> ${data.message}<br>
            <strong>Destination:</strong> ${details.destination || 'Not specified'}<br>
            <strong>Interests:</strong> ${details.interests.join(', ') || 'None'}
        `;
      } catch (error) {
        console.error("connection failed:", error);
        // 3. Show error state
        resultElement.innerText = "Sorry, we couldn't connect to the server. Please try again later.";
      }
    };

  </script>
</body>

</html>
