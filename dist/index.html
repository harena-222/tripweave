<!doctype html>
<html lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>
  <h1>Make Your Trip</h1>

  <input type="text" id="userInput" placeholder="How can I help you？">
  <button id="sendBtn">⇒</button>

  <p id="result"></p>

  <script>
    document.getElementById('sendBtn').onclick = async () => {
      const input = document.getElementById('userInput').value;
      const resultElement = document.getElementById('result');

      // 1. Show loading state
      resultElement.innerHTML = "<em>Designing your travel plan... Please wait a moment.</em>";

      try {
        const response = await fetch('http://localhost:3000/api/trip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ destination: input })
        });

        if (!response.ok) {
          throw new Error(`server response error: ${response.status}`);
        }

        const data = await response.json();
        const details = data.details.extracted_entities;

        // 2. Show success result
        resultElement.innerHTML = `
            <strong>Intent:</strong> ${data.message}<br>
            <strong>Destination:</strong> ${details.destination || 'Not specified'}<br>
            <strong>Interests:</strong> ${details.interests.join(', ') || 'None'}
        `;
      } catch (error) {
        console.error("connection failed:", error);
        // 3. Show error state
        resultElement.innerText = "Sorry, we couldn't connect to the server. Please try again later.";
      }
    };
  </script>
</body>

</html>
